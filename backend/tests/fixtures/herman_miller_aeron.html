<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Aeron Chair</title>
  </head>
  <body class="body-herman-miller">
    <main>
      <h1>Aeron Chair</h1>
      <div class="price">$1,537.50</div>
      <div class="page">
        <div id="attribute-accordion" class="accordion">
          <div class="card-body">
            <div class="attr-group-body">
              <fieldset class="pb-3 pt-1 px-3 d-flex attr-group-items flex-nowrap flex-md-wrap">
                <legend>Color</legend>
                <input
                  type="radio"
                  id="framebase-graphite_graphite"
                  name="framebase"
                  data-attr-displayvalue="Graphite / Graphite"
                  checked
                />
                <label for="framebase-graphite_graphite">
                  <span class="sr-only">View this product in: Graphite / Graphite</span>
                </label>
                <input
                  type="radio"
                  id="framebase-black_onyx"
                  name="framebase"
                  data-attr-displayvalue="Black / Onyx Ultra Matte"
                />
                <label for="framebase-black_onyx">
                  <span class="sr-only">View this product in: Black / Onyx Ultra Matte</span>
                </label>
              </fieldset>
            </div>
          </div>
          <div class="card-body">
            <div class="attr-group-body">
              <fieldset class="px-3 d-flex attr-group-items flex-wrap pb-2 pt-3">
                <legend>Size</legend>
                <input
                  type="radio"
                  id="size-size_a_small"
                  name="size"
                  data-attr-displayvalue="Size A - Small"
                />
                <label for="size-size_a_small">
                  <span class="sr-only">View this product in: Size A - Small</span>
                  <span>Size A - Small</span>
                </label>
                <input
                  type="radio"
                  id="size-size_b_medium"
                  name="size"
                  data-attr-displayvalue="Size B - Medium"
                  checked
                />
                <label for="size-size_b_medium">
                  <span class="sr-only">View this product in: Size B - Medium</span>
                  <span>Size B - Medium</span>
                </label>
              </fieldset>
            </div>
          </div>
          <div class="card-body">
            <div class="attr-group-body">
              <fieldset class="px-3 d-flex attr-group-items flex-wrap pb-2 pt-3">
                <legend>Back support</legend>
                <input
                  type="radio"
                  id="backSupport-basic_back_support"
                  name="backSupport"
                  data-attr-displayvalue="Basic Back Support"
                />
                <label for="backSupport-basic_back_support">
                  <span class="sr-only">View this product in: Back Support</span>
                  <span>Basic Back Support</span>
                </label>
                <input
                  type="radio"
                  id="backSupport-adjustable_lumbar_support"
                  name="backSupport"
                  data-attr-displayvalue="Adjustable Lumbar Support"
                />
                <label for="backSupport-adjustable_lumbar_support">
                  <span class="sr-only">View this product in: Back Support</span>
                  <span>Adjustable Lumbar Support</span>
                </label>
              </fieldset>
            </div>
          </div>
          <div class="card-body">
            <div class="attr-group-body">
              <fieldset class="px-3 d-flex attr-group-items flex-wrap pb-2 pt-3">
                <legend>Arms</legend>
                <input
                  type="radio"
                  id="arms-height_adjustable_arms"
                  name="arms"
                  data-attr-displayvalue="Height-Adjustable Arms"
                />
                <label for="arms-height_adjustable_arms">
                  <span class="sr-only">View this product in: Arms</span>
                  <span>Height-Adjustable Arms</span>
                </label>
                <input
                  type="radio"
                  id="arms-fully_adjustable_arms"
                  name="arms"
                  data-attr-displayvalue="Fully Adjustable Arms"
                />
                <label for="arms-fully_adjustable_arms">
                  <span class="sr-only">View this product in: Arms</span>
                  <span>Fully Adjustable Arms</span>
                </label>
              </fieldset>
            </div>
          </div>
          <div class="card-body">
            <div class="attr-group-body">
              <fieldset class="px-3 d-flex attr-group-items flex-wrap pb-2 pt-3">
                <legend>Armpad</legend>
                <input
                  type="radio"
                  id="armpad-standard"
                  name="armpad"
                  data-attr-displayvalue="Standard"
                />
                <label for="armpad-standard">
                  <span class="sr-only">View this product in: Armpad</span>
                  <span>Standard</span>
                </label>
                <input
                  type="radio"
                  id="armpad-leather"
                  name="armpad"
                  data-attr-displayvalue="Leather"
                />
                <label for="armpad-leather">
                  <span class="sr-only">View this product in: Armpad</span>
                  <span>Leather</span>
                </label>
              </fieldset>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
